<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メール送信完了 | ミッドグラン自治会</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
    .login-box { width: 100%; max-width: 380px; padding: 20px; }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo-icon { width: 56px; height: 56px; background: #1e293b; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 26px; }
    .login-logo-title { font-size: 18px; font-weight: 700; }
    .login-logo-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .login-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 28px; box-shadow: var(--shadow-md); text-align: center; }
    .sent-icon { font-size: 40px; margin-bottom: 16px; }
    .login-footer { text-align: center; margin-top: 16px; }
    .login-footer a { font-size: 13px; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">⚙️</div>
      <div class="login-logo-title">ミッドグラン自治会 管理画面</div>
      <div class="login-logo-sub">会長専用</div>
    </div>

    <div class="login-card">
      <div class="sent-icon">📧</div>
      <h2 style="font-size:16px; font-weight:700; margin-bottom:12px;">メールを送信しました</h2>
      <p style="font-size:13px; color:var(--text-muted); line-height:1.6;">
        入力されたメールアドレスにパスワード再設定用のリンクをお送りしました。メールをご確認ください。
      </p>
      <p style="font-size:12px; color:var(--text-muted); margin-top:12px;">
        メールが届かない場合は、迷惑メールフォルダをご確認ください。
      </p>
    </div>

    <div class="login-footer">
      <a href="admin_login.html">← ログインに戻る</a>
    </div>
  </div>
</body>
</html>
