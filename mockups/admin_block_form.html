<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班編集 | 管理画面</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-logo">⚙️ 〇〇自治会 管理画面</div>
    <div style="display:flex; align-items:center; gap:12px;">
      
      <a href="admin_login.html" class="btn btn-secondary btn-sm">ログアウト</a>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-section">メニュー</div>
      <a href="admin_dashboard.html" class="admin-sidebar-item">🏠 ダッシュボード</a>
      <a href="admin_circulars.html" class="admin-sidebar-item">📋 回覧板管理</a>
      <a href="admin_notices.html" class="admin-sidebar-item">📢 お知らせ管理</a>
      <a href="admin_blocks.html" class="admin-sidebar-item active">🏘 班管理</a>
      <div class="admin-sidebar-section">設定</div>
      <a href="admin_settings.html" class="admin-sidebar-item">🔑 サイト設定</a>
      <a href="index.html" class="admin-sidebar-item" target="_blank">🔗 サイトを表示</a>
    </aside>

    <main class="admin-content">
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:24px;">
        <a href="admin_blocks.html" style="color:var(--text-muted); font-size:13px;">← 班管理</a>
        <span style="color:var(--border);">|</span>
        <div style="font-size:20px; font-weight:700;">班を編集</div>
      </div>

      <div style="max-width:500px;">
        <div class="card">

          <!-- 班名 -->
          <div class="form-group">
            <label class="form-label">班名 <span class="required">*</span></label>
            <input type="text" class="form-control" value="1班" placeholder="例：1班、北地区など">
            <div class="form-hint">表示順はリスト画面でドラッグ＆ドロップで変更できます</div>
          </div>

          <!-- ステータス -->
          <div class="form-group">
            <label class="form-label">ステータス <span class="required">*</span></label>
            <div style="display:flex; flex-direction:column; gap:10px; margin-top:4px;">
              <label style="display:flex; align-items:center; gap:8px; font-size:14px; cursor:pointer;">
                <input type="radio" name="status" checked style="accent-color:var(--primary);"> 有効
              </label>
              <label style="display:flex; align-items:flex-start; gap:8px; font-size:14px; cursor:pointer;">
                <input type="radio" name="status" style="accent-color:var(--primary); margin-top:2px;"> 無効（統廃合済み）
                <span style="font-size:12px; color:var(--text-muted); display:block; margin-top:2px;">無効にすると新規のお知らせ・回覧板の配信対象から除外されます。過去のデータは保持されます。</span>
              </label>
            </div>
          </div>

        </div>

        <!-- アクションボタン -->
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:16px;">
          <a href="admin_blocks.html" class="btn btn-secondary">キャンセル</a>
          <a href="admin_blocks.html" class="btn btn-primary">保存</a>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
