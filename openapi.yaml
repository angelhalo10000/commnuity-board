openapi: 3.0.3
info:
  title: 電子自治会アプリ API
  version: 1.0.0

servers:
  - url: /api

tags:
  - name: viewer-session
    description: 公開側認証
  - name: viewer-notices
    description: お知らせ（公開側）
  - name: viewer-circulars
    description: 回覧板（公開側）
  - name: admin-session
    description: 管理者認証
  - name: admin-notices
    description: お知らせ管理
  - name: admin-circulars
    description: 回覧板管理
  - name: admin-settings
    description: 設定

# ─────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────
paths:
  # ── 公開側認証 ──────────────────────────────

  /viewer/session:
    get:
      tags: [viewer-session]
      summary: ログイン状態確認
      description: セッションCookieが有効な場合、現在のロールと自治会名を返す。
      responses:
        "200":
          description: ログイン済み
          content:
            application/json:
              schema:
                type: object
                properties:
                  role:
                    type: string
                    enum: [member, leader]
                  organization_name:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [viewer-session]
      summary: 共通パスワード認証
      description: |
        入力されたパスワードを班長共通PW → 会員共通PW の順で照合し、
        一致したロールのセッションCookieを発行する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "200":
          description: 認証成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  role:
                    type: string
                    enum: [member, leader]
                  organization_name:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [viewer-session]
      summary: 公開側ログアウト
      responses:
        "204":
          description: ログアウト成功

  # ── お知らせ（公開側） ────────────────────────

  /viewer/notices:
    get:
      tags: [viewer-notices]
      summary: お知らせ一覧・検索
      description: ログインユーザーのロール（member/leader）に応じてフィルタリング。
      security:
        - memberSession: []
      parameters:
        - $ref: "#/components/parameters/keyword"
        - $ref: "#/components/parameters/year"
        - $ref: "#/components/parameters/month"
        - $ref: "#/components/parameters/page"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  notices:
                    type: array
                    items:
                      $ref: "#/components/schemas/NoticeSummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /viewer/notices/{id}:
    get:
      tags: [viewer-notices]
      summary: お知らせ詳細
      security:
        - memberSession: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoticeDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── 回覧板（公開側） ─────────────────────────

  /viewer/circulars:
    get:
      tags: [viewer-circulars]
      summary: 回覧板一覧・検索
      security:
        - memberSession: []
      parameters:
        - $ref: "#/components/parameters/keyword"
        - $ref: "#/components/parameters/year"
        - $ref: "#/components/parameters/month"
        - $ref: "#/components/parameters/page"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  circulars:
                    type: array
                    items:
                      $ref: "#/components/schemas/CircularSummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /viewer/circulars/{id}:
    get:
      tags: [viewer-circulars]
      summary: 回覧板詳細
      security:
        - memberSession: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircularDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── 管理者認証 ──────────────────────────────

  /admin/session:
    get:
      tags: [admin-session]
      summary: 管理者ログイン状態確認
      responses:
        "200":
          description: ログイン済み
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization_name:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [admin-session]
      summary: 管理者ログイン
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "200":
          description: ログイン成功
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [admin-session]
      summary: 管理者ログアウト
      responses:
        "204":
          description: ログアウト成功

  # ── お知らせ管理 ─────────────────────────────

  /admin/notices:
    get:
      tags: [admin-notices]
      summary: お知らせ一覧（管理）
      security:
        - adminSession: []
      parameters:
        - $ref: "#/components/parameters/keyword"
        - $ref: "#/components/parameters/year"
        - $ref: "#/components/parameters/month"
        - name: target_type
          in: query
          schema:
            type: string
            enum: [all, leaders]
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, scheduled, published, archived]
        - $ref: "#/components/parameters/page"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  notices:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminNoticeSummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [admin-notices]
      summary: お知らせ作成
      security:
        - adminSession: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/NoticeInput"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminNoticeDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /admin/notices/{id}:
    get:
      tags: [admin-notices]
      summary: お知らせ詳細（管理）
      security:
        - adminSession: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminNoticeDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [admin-notices]
      summary: お知らせ更新
      security:
        - adminSession: []
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/NoticeInput"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminNoticeDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      tags: [admin-notices]
      summary: お知らせ削除
      security:
        - adminSession: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── 回覧板管理 ──────────────────────────────

  /admin/circulars:
    get:
      tags: [admin-circulars]
      summary: 回覧板一覧（管理）
      security:
        - adminSession: []
      parameters:
        - $ref: "#/components/parameters/keyword"
        - $ref: "#/components/parameters/year"
        - $ref: "#/components/parameters/month"
        - name: target_type
          in: query
          schema:
            type: string
            enum: [all, leaders]
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, scheduled, published, archived]
        - $ref: "#/components/parameters/page"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  circulars:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminCircularSummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [admin-circulars]
      summary: 回覧板作成
      security:
        - adminSession: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CircularInput"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCircularDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /admin/circulars/{id}:
    get:
      tags: [admin-circulars]
      summary: 回覧板詳細（管理）
      security:
        - adminSession: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCircularDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [admin-circulars]
      summary: 回覧板更新
      security:
        - adminSession: []
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CircularInput"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCircularDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      tags: [admin-circulars]
      summary: 回覧板削除
      security:
        - adminSession: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── 設定 ────────────────────────────────────

  /admin/settings:
    get:
      tags: [admin-settings]
      summary: 設定情報取得
      security:
        - adminSession: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization_name:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/settings/member_password:
    patch:
      tags: [admin-settings]
      summary: 会員共通パスワード変更
      security:
        - adminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SharedPasswordInput"
      responses:
        "204":
          description: 変更成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /admin/settings/leader_password:
    patch:
      tags: [admin-settings]
      summary: 班長共通パスワード変更
      security:
        - adminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SharedPasswordInput"
      responses:
        "204":
          description: 変更成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /admin/settings/admin_password:
    patch:
      tags: [admin-settings]
      summary: 管理者パスワード変更
      security:
        - adminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, password]
              properties:
                current_password:
                  type: string
                password:
                  type: string
      responses:
        "204":
          description: 変更成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /admin/settings/organization:
    patch:
      tags: [admin-settings]
      summary: 自治会名変更
      security:
        - adminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "204":
          description: 変更成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

# ─────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────
components:
  securitySchemes:
    memberSession:
      type: apiKey
      in: cookie
      name: _member_session_id
      description: 会員または班長セッション（POST /api/viewer/session で取得）
    adminSession:
      type: apiKey
      in: cookie
      name: _admin_session_id
      description: 管理者セッション（POST /api/admin/session で取得）

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    keyword:
      name: keyword
      in: query
      schema:
        type: string
    year:
      name: year
      in: query
      schema:
        type: integer
    month:
      name: month
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 12
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1

  schemas:
    Pagination:
      type: object
      description: ページネーション情報。1ページあたり10件固定。
      properties:
        current_page:
          type: integer
        total_pages:
          type: integer
        total_count:
          type: integer

    NoticeSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        target_type:
          type: string
          enum: [all, leaders]
        published_at:
          type: string
          format: date-time
        is_new:
          type: boolean
          description: 配信日から30日以内の場合true

    NoticeDetail:
      allOf:
        - $ref: "#/components/schemas/NoticeSummary"
        - type: object
          properties:
            body:
              type: string
            attachments:
              type: array
              items:
                $ref: "#/components/schemas/Attachment"
            updated_at:
              type: string
              format: date-time

    AdminNoticeSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        target_type:
          type: string
          enum: [all, leaders]
        status:
          type: string
          enum: [draft, scheduled, published, archived]
          description: |
            `scheduled` は仮想ステータス。DBでは `published` として保存されているが、
            `published_at` が未来の場合に `scheduled` として返される。
        scheduled_at:
          type: string
          format: date-time
          nullable: true
          description: status が scheduled の場合に published_at の値が入る。それ以外は null。
        published_at:
          type: string
          format: date-time
          nullable: true
          description: status が scheduled の場合は null。公開済みの場合は配信日時。

    AdminNoticeDetail:
      allOf:
        - $ref: "#/components/schemas/AdminNoticeSummary"
        - type: object
          properties:
            body:
              type: string
            attachments:
              type: array
              items:
                $ref: "#/components/schemas/Attachment"
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    NoticeInput:
      type: object
      required: [title, body, target_type, status]
      properties:
        title:
          type: string
        body:
          type: string
        target_type:
          type: string
          enum: [all, leaders]
        status:
          type: string
          enum: [draft, scheduled, published]
        scheduled_at:
          type: string
          format: date-time
          description: status が scheduled の場合は必須
        attachments[]:
          type: array
          items:
            type: string
            format: binary
        remove_attachment_ids[]:
          type: array
          items:
            type: string
            format: uuid
          description: 削除する添付ファイルのID

    CircularSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        target_type:
          type: string
          enum: [all, leaders]
        published_at:
          type: string
          format: date-time
        is_new:
          type: boolean
          description: 配信日から30日以内の場合true

    CircularDetail:
      allOf:
        - $ref: "#/components/schemas/CircularSummary"
        - type: object
          properties:
            files:
              type: array
              items:
                $ref: "#/components/schemas/Attachment"

    AdminCircularSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        target_type:
          type: string
          enum: [all, leaders]
        status:
          type: string
          enum: [draft, scheduled, published, archived]
          description: |
            `scheduled` は仮想ステータス。DBでは `published` として保存されているが、
            `published_at` が未来の場合に `scheduled` として返される。
        scheduled_at:
          type: string
          format: date-time
          nullable: true
          description: status が scheduled の場合に published_at の値が入る。それ以外は null。
        published_at:
          type: string
          format: date-time
          nullable: true
          description: status が scheduled の場合は null。公開済みの場合は配信日時。
        files_count:
          type: integer
          description: 添付ファイル数

    AdminCircularDetail:
      allOf:
        - $ref: "#/components/schemas/AdminCircularSummary"
        - type: object
          properties:
            files:
              type: array
              items:
                $ref: "#/components/schemas/Attachment"

    CircularInput:
      type: object
      required: [title, target_type, status]
      properties:
        title:
          type: string
        target_type:
          type: string
          enum: [all, leaders]
        status:
          type: string
          enum: [draft, scheduled, published]
        scheduled_at:
          type: string
          format: date-time
          description: status が scheduled の場合は必須
        files[]:
          type: array
          items:
            type: string
            format: binary
          description: PDF または画像ファイル（複数可）
        remove_file_ids[]:
          type: array
          items:
            type: string
            format: uuid
          description: 削除するファイルのID（更新時のみ使用）

    SharedPasswordInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        content_type:
          type: string
        byte_size:
          type: integer
        file_url:
          type: string
          format: uri
        file_type:
          type: string
          enum: [pdf, image]
          description: 回覧板ファイルのみ付与される

    Error:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string

  responses:
    Unauthorized:
      description: 認証されていない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: 権限がない（班長向けコンテンツへの会員アクセス等）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: リソースが存在しない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnprocessableEntity:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
