services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  web:
    build:
      context: ./backend
    command: bash -c "bundle exec rails db:prepare && bundle exec rails s -b 0.0.0.0"
    volumes:
      - ./backend:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://app:password@db:5432/app_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
    depends_on:
      - db
      - redis

  front:
    build:
      context: ./frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - web

  swagger-viewer:
    image: swaggerapi/swagger-ui
    ports:
      - "8080:8080"
    environment:
      SWAGGER_JSON: /tmp/openapi.yaml
      SWAGGER_UI_PARAMETERS: '{"filter": "viewer"}'
    volumes:
      - ./openapi.yaml:/tmp/openapi.yaml

  swagger-admin:
    image: swaggerapi/swagger-ui
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /tmp/openapi.yaml
      SWAGGER_UI_PARAMETERS: '{"filter": "admin"}'
    volumes:
      - ./openapi.yaml:/tmp/openapi.yaml

volumes:
  postgres_data:
  redis_data:
  bundle_cache:
  node_modules:
