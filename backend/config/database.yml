default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>

test:
  <<: *default
  host: db
  username: app
  password: password
  database: app_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
